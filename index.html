<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="format-detection" content="telephone=no">
  <title>💕 送给林佳瑶</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { 
      width: 100%; 
      height: 100%; 
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      -webkit-user-select: none;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }
    body {
      background: linear-gradient(135deg, #050810 0%, #0a1628 20%, #0f2847 40%, #1a3a5c 60%, #0f2847 80%, #050810 100%);
      background-size: 400% 400%;
      animation: bgMove 15s ease infinite;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    @keyframes bgMove {
      0%, 100% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
    }
    /* 极光层 */
    .aurora {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 1;
      opacity: 0.6;
    }
    .aurora::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(ellipse 80% 50% at 30% 20%, rgba(100, 181, 246, 0.2) 0%, transparent 50%),
                  radial-gradient(ellipse 60% 40% at 70% 30%, rgba(33, 150, 243, 0.15) 0%, transparent 50%),
                  radial-gradient(ellipse 50% 30% at 50% 80%, rgba(0, 188, 212, 0.12) 0%, transparent 50%);
      animation: auroraFloat 20s ease-in-out infinite;
    }
    @keyframes auroraFloat {
      0%, 100% { transform: translate(0, 0) rotate(0deg); }
      25% { transform: translate(2%, 1%) rotate(1deg); }
      50% { transform: translate(-1%, 2%) rotate(-1deg); }
      75% { transform: translate(1%, -1%) rotate(0.5deg); }
    }
    .canvas-wrap {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 2;
    }
    .hearts {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      z-index: 3;
    }
    .heart {
      position: absolute;
      font-size: 20px;
      animation: floatUp 8s ease-in infinite;
      opacity: 0.6;
      filter: drop-shadow(0 0 8px rgba(255, 107, 157, 0.5));
    }
    .heart::before { content: '💗'; }
    .heart:nth-child(2n)::before { content: '💕'; }
    .heart:nth-child(3n)::before { content: '❤️'; }
    .heart:nth-child(5n)::before { content: '💖'; }
    @keyframes floatUp {
      0% { transform: translateY(100vh) rotate(0deg) scale(0.5); opacity: 0; }
      10% { opacity: 0.7; }
      50% { transform: translateY(50vh) rotate(180deg) scale(1.2); opacity: 0.8; }
      90% { opacity: 0.3; }
      100% { transform: translateY(-100px) rotate(360deg) scale(0.8); opacity: 0; }
    }
    /* 流星 */
    .shooting-star {
      position: fixed;
      width: 120px;
      height: 2px;
      background: linear-gradient(90deg, rgba(255,255,255,0.9), transparent);
      border-radius: 50%;
      pointer-events: none;
      z-index: 4;
      animation: shoot 2s linear forwards;
      transform-origin: left center;
    }
    @keyframes shoot {
      0% { opacity: 0; transform: translate(-100px, -100px) rotate(-45deg); }
      10% { opacity: 1; }
      90% { opacity: 0.5; }
      100% { opacity: 0; transform: translate(calc(100vw + 200px), calc(100vh + 200px)) rotate(-45deg); }
    }
    .content {
      position: relative;
      z-index: 10;
      text-align: center;
      padding: 20px;
      max-width: 90vw;
    }
    .title {
      font-size: clamp(14px, 5vw, 18px);
      color: rgba(255, 182, 193, 0.9);
      margin-bottom: 30px;
      letter-spacing: 4px;
      animation: fadeIn 2s ease, shimmer 4s ease-in-out 2s infinite;
    }
    @keyframes shimmer {
      0%, 100% { filter: brightness(1); }
      50% { filter: brightness(1.3); }
    }
    .main-text {
      font-size: clamp(28px, 10vw, 48px);
      font-weight: 900;
      background: linear-gradient(90deg, #ff6b9d, #c44569, #ff6b9d, #ffb6c1, #ff6b9d);
      background-size: 400% 100%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: gradientShift 3s ease infinite, pulse 2s ease-in-out infinite;
      line-height: 1.4;
      letter-spacing: 2px;
      filter: drop-shadow(0 0 20px rgba(255, 107, 157, 0.6));
    }
    .main-text .highlight {
      -webkit-text-fill-color: #ff6b9d;
      text-shadow: 0 0 30px rgba(255, 107, 157, 0.9), 0 0 60px rgba(255, 107, 157, 0.5);
      filter: drop-shadow(0 0 15px rgba(255, 107, 157, 0.8));
    }
    @keyframes gradientShift {
      0%, 100% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.03); }
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-30px) scale(0.95); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }
    .subtitle {
      margin-top: 40px;
      font-size: clamp(14px, 4vw, 18px);
      color: rgba(255, 255, 255, 0.8);
      animation: fadeIn 2s ease 1s both;
      letter-spacing: 8px;
      text-shadow: 0 0 10px rgba(255, 182, 193, 0.5);
    }
    .date {
      margin-top: 20px;
      font-size: 12px;
      color: rgba(255, 182, 193, 0.6);
      animation: fadeIn 2s ease 2s both;
    }
    .tap-hint {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 12px;
      color: rgba(255, 255, 255, 0.5);
      animation: blink 2s ease-in-out infinite;
      z-index: 10;
    }
    @keyframes blink {
      0%, 100% { opacity: 0.4; }
      50% { opacity: 1; }
    }
    .sparkle {
      position: fixed;
      width: 6px;
      height: 6px;
      background: radial-gradient(circle, #fff 0%, rgba(255,182,193,0.8) 50%, transparent 70%);
      border-radius: 50%;
      animation: sparkle 1.2s ease-out forwards;
      pointer-events: none;
      z-index: 100;
    }
    @keyframes sparkle {
      0% { transform: scale(0); opacity: 1; }
      50% { transform: scale(2); opacity: 0.8; }
      100% { transform: scale(3); opacity: 0; }
    }
    .particle {
      position: fixed;
      width: 4px;
      height: 4px;
      background: #ffb6c1;
      border-radius: 50%;
      pointer-events: none;
      z-index: 99;
      animation: particleBurst 1s ease-out forwards;
    }
    @keyframes particleBurst {
      0% { transform: translate(0,0) scale(1); opacity: 1; }
      100% { transform: translate(var(--tx), var(--ty)) scale(0); opacity: 0; }
    }
    .glow-ring {
      position: fixed;
      border: 2px solid rgba(255, 107, 157, 0.6);
      border-radius: 50%;
      pointer-events: none;
      z-index: 98;
      animation: ringExpand 0.8s ease-out forwards;
    }
    @keyframes ringExpand {
      0% { transform: translate(-50%, -50%) scale(0); opacity: 1; }
      100% { transform: translate(-50%, -50%) scale(8); opacity: 0; }
    }
  </style>
</head>
<body>
  <div class="aurora"></div>
  <canvas class="canvas-wrap" id="canvas"></canvas>
  <div class="hearts" id="hearts"></div>
  <div class="content">
    <div class="title">✦ 来自潘海涛的告白 ✦</div>
    <div class="main-text" id="mainText">潘海涛<span class="highlight">最爱</span>林佳瑶</div>
    <div class="subtitle">Forever & Always</div>
    <div class="date">💕 每一天都比昨天更爱你 💕</div>
  </div>
  <div class="tap-hint">👆 点击屏幕有惊喜</div>

  <script>
    (function() {
      function createHearts() {
        const container = document.getElementById('hearts');
        const hearts = ['💗', '💕', '❤️', '💖', '💝'];
        for (let i = 0; i < 20; i++) {
          const heart = document.createElement('div');
          heart.className = 'heart';
          heart.textContent = hearts[i % hearts.length];
          heart.style.left = Math.random() * 100 + '%';
          heart.style.animationDelay = Math.random() * 8 + 's';
          heart.style.animationDuration = (6 + Math.random() * 4) + 's';
          container.appendChild(heart);
        }
      }
      createHearts();

      // 流星效果 - 每 4 秒一颗
      function createShootingStar() {
        const star = document.createElement('div');
        star.className = 'shooting-star';
        star.style.left = Math.random() * 50 + '%';
        star.style.top = Math.random() * 30 + '%';
        document.body.appendChild(star);
        setTimeout(() => star.remove(), 2000);
      }
      setInterval(createShootingStar, 4000);
      setTimeout(createShootingStar, 1500);

      const canvas = document.getElementById('canvas');
      const ctx = canvas.getContext('2d');
      let width = canvas.width = window.innerWidth;
      let height = canvas.height = window.innerHeight;

      const stars = [];
      for (let i = 0; i < 120; i++) {
        stars.push({
          x: Math.random() * width,
          y: Math.random() * height,
          r: Math.random() * 2.5 + 0.5,
          twinkle: Math.random() * Math.PI * 2,
          speed: Math.random() * 0.5 + 0.5
        });
      }

      function drawStars() {
        ctx.clearRect(0, 0, width, height);
        const time = Date.now() * 0.002;
        stars.forEach(s => {
          const alpha = 0.4 + Math.sin(time * s.speed + s.twinkle) * 0.5;
          ctx.beginPath();
          ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
          const gradient = ctx.createRadialGradient(s.x, s.y, 0, s.x, s.y, s.r * 3);
          gradient.addColorStop(0, 'rgba(255, 255, 255, ' + alpha + ')');
          gradient.addColorStop(0.5, 'rgba(173, 216, 230, ' + alpha * 0.8 + ')');
          gradient.addColorStop(1, 'transparent');
          ctx.fillStyle = gradient;
          ctx.fill();
        });
      }

      function animate() {
        drawStars();
        requestAnimationFrame(animate);
      }
      animate();

      window.addEventListener('resize', () => {
        width = canvas.width = window.innerWidth;
        height = canvas.height = window.innerHeight;
      });

      // 点击特效增强：光晕圈 + 粒子爆发 + 多爱心
      document.body.addEventListener('click', function(e) {
        const x = e.clientX;
        const y = e.clientY;

        // 扩散光晕圈
        const ring = document.createElement('div');
        ring.className = 'glow-ring';
        ring.style.left = x + 'px';
        ring.style.top = y + 'px';
        document.body.appendChild(ring);
        setTimeout(() => ring.remove(), 800);

        // 多个闪光点
        for (let i = 0; i < 8; i++) {
          const sparkle = document.createElement('div');
          sparkle.className = 'sparkle';
          const angle = (i / 8) * Math.PI * 2 + Math.random();
          const dist = 30 + Math.random() * 40;
          sparkle.style.left = (x + Math.cos(angle) * dist - 3) + 'px';
          sparkle.style.top = (y + Math.sin(angle) * dist - 3) + 'px';
          sparkle.style.animationDelay = (i * 0.03) + 's';
          document.body.appendChild(sparkle);
          setTimeout(() => sparkle.remove(), 1200);
        }

        // 粒子爆发
        for (let i = 0; i < 12; i++) {
          const particle = document.createElement('div');
          particle.className = 'particle';
          const angle = (i / 12) * Math.PI * 2 + Math.random();
          const dist = 80 + Math.random() * 60;
          particle.style.left = x + 'px';
          particle.style.top = y + 'px';
          particle.style.setProperty('--tx', Math.cos(angle) * dist + 'px');
          particle.style.setProperty('--ty', Math.sin(angle) * dist + 'px');
          document.body.appendChild(particle);
          setTimeout(() => particle.remove(), 1000);
        }

        // 多颗爱心爆发
        const heartEmojis = ['💗', '💕', '❤️', '💖', '💝'];
        for (let i = 0; i < 5; i++) {
          const heart = document.createElement('div');
          heart.className = 'heart';
          heart.textContent = heartEmojis[Math.floor(Math.random() * heartEmojis.length)];
          heart.style.left = (x - 20 + Math.random() * 40) + 'px';
          heart.style.top = (y - 20 + Math.random() * 40) + 'px';
          heart.style.animation = 'none';
          heart.style.fontSize = (24 + Math.random() * 20) + 'px';
          document.getElementById('hearts').appendChild(heart);
          heart.offsetHeight;
          heart.style.animation = 'floatUp ' + (4 + Math.random() * 3) + 's ease-in forwards';
          heart.style.animationDelay = (i * 0.1) + 's';
          setTimeout(() => heart.remove(), 7000);
        }
      });
    })();
  </script>
</body>
</html>
