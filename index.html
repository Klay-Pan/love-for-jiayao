<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="format-detection" content="telephone=no">
  <title>🐍 贪吃蛇</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Hiragino Sans GB", sans-serif;
      -webkit-user-select: none;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
      background: #0f1419;
    }
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
    }
    .header {
      padding: 12px 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      width: 100%;
      max-width: 600px;
      padding-left: 16px;
      padding-right: 16px;
    }
    .score {
      font-size: 18px;
      font-weight: bold;
      color: #7bed9f;
      text-shadow: 0 0 10px rgba(123, 237, 159, 0.5);
    }
    .length {
      font-size: 14px;
      color: rgba(255,255,255,0.6);
    }
    .game-wrap {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      padding: 0 10px 120px;
    }
    #gameCanvas {
      border-radius: 16px;
      box-shadow: 0 0 40px rgba(0,0,0,0.5), inset 0 0 0 3px rgba(255,255,255,0.05);
      touch-action: none;
    }
    .game-overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0, 0, 0, 0.88);
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 100;
    }
    .game-overlay.active { display: flex; }
    .overlay-title {
      font-size: 32px;
      color: #ff6b81;
      margin-bottom: 8px;
      text-shadow: 0 0 20px rgba(255,107,129,0.6);
    }
    .overlay-score {
      font-size: 20px;
      color: rgba(255,255,255,0.9);
      margin-bottom: 30px;
    }
    .btn-restart {
      padding: 16px 50px;
      font-size: 18px;
      font-weight: bold;
      color: #fff;
      background: linear-gradient(135deg, #2ed573, #1e90ff);
      border: none;
      border-radius: 30px;
      cursor: pointer;
      box-shadow: 0 6px 25px rgba(46, 213, 115, 0.4);
    }
    .dpad {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      display: grid;
      grid-template-columns: 60px 60px 60px;
      grid-template-rows: 60px 60px 60px;
      gap: 8px;
      z-index: 50;
    }
    .dpad-btn {
      width: 60px;
      height: 60px;
      border: none;
      border-radius: 16px;
      background: linear-gradient(145deg, rgba(255,255,255,0.15), rgba(255,255,255,0.05));
      color: rgba(255, 255, 255, 0.9);
      font-size: 28px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
      box-shadow: 0 4px 15px rgba(0,0,0,0.3);
    }
    .dpad-btn:active {
      background: linear-gradient(145deg, rgba(46, 213, 115, 0.4), rgba(30, 144, 255, 0.3));
    }
    .dpad-btn.blank {
      background: transparent;
      box-shadow: none;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div class="header">
    <span class="score" id="score">得分: 0</span>
    <span class="length" id="length">长度: 3</span>
  </div>
  <div class="game-wrap">
    <canvas id="gameCanvas"></canvas>
  </div>
  <div class="game-overlay" id="gameOverlay">
    <div class="overlay-title">游戏结束</div>
    <div class="overlay-score" id="finalScore">得分: 0</div>
    <button class="btn-restart" id="btnRestart">再玩一次</button>
  </div>
  <div class="dpad">
    <span class="dpad-btn blank"></span>
    <button class="dpad-btn" id="btnUp">↑</button>
    <span class="dpad-btn blank"></span>
    <button class="dpad-btn" id="btnLeft">←</button>
    <span class="dpad-btn blank"></span>
    <button class="dpad-btn" id="btnRight">→</button>
    <span class="dpad-btn blank"></span>
    <button class="dpad-btn" id="btnDown">↓</button>
    <span class="dpad-btn blank"></span>
  </div>

  <script>
    (function() {
      const canvas = document.getElementById('gameCanvas');
      const ctx = canvas.getContext('2d');

      const COLS = 18;
      const ROWS = 24;
      const SPEED = 165;
      let cellSize = 0;

      function resize() {
        const availW = window.innerWidth - 20;
        const availH = window.innerHeight - 180;
        cellSize = Math.min(
          Math.floor(availW / COLS),
          Math.floor(availH / ROWS)
        );
        canvas.width = COLS * cellSize;
        canvas.height = ROWS * cellSize;
      }
      resize();
      window.addEventListener('resize', resize);

      let snake = [];
      let dir = { x: 1, y: 0 };
      let nextDir = { x: 1, y: 0 };
      let food = { x: 0, y: 0 };
      let score = 0;
      let gameOver = false;
      let gameLoopId = null;
      let animTime = 0;

      function randomFood() {
        do {
          food.x = Math.floor(Math.random() * COLS);
          food.y = Math.floor(Math.random() * ROWS);
        } while (snake.some(s => s.x === food.x && s.y === food.y));
      }

      function drawSnakeSegment(x, y, isHead, dirX, dirY, index) {
        const px = x * cellSize;
        const py = y * cellSize;
        const r = cellSize * 0.45;
        const cx = px + cellSize / 2;
        const cy = py + cellSize / 2;

        if (isHead) {
          ctx.save();
          const angle = dirY === -1 ? -Math.PI/2 : dirY === 1 ? Math.PI/2 : dirX === 1 ? 0 : Math.PI;
          ctx.translate(cx, cy);
          ctx.rotate(angle);

          const gradient = ctx.createRadialGradient(-r*0.3, -r*0.3, 0, 0, 0, r*1.2);
          gradient.addColorStop(0, '#8bde7c');
          gradient.addColorStop(0.5, '#5cb85c');
          gradient.addColorStop(1, '#3d8b3d');

          ctx.beginPath();
          ctx.ellipse(0, 0, r, r*1.1, 0, 0, Math.PI*2);
          ctx.fillStyle = gradient;
          ctx.fill();
          ctx.strokeStyle = 'rgba(0,0,0,0.2)';
          ctx.lineWidth = 2;
          ctx.stroke();

          ctx.fillStyle = '#fff';
          ctx.beginPath();
          ctx.ellipse(-r*0.3, -r*0.2, r*0.2, r*0.25, 0, 0, Math.PI*2);
          ctx.fill();
          ctx.beginPath();
          ctx.ellipse(r*0.3, -r*0.2, r*0.2, r*0.25, 0, 0, Math.PI*2);
          ctx.fill();
          ctx.fillStyle = '#222';
          ctx.beginPath();
          ctx.arc(-r*0.3, -r*0.2, r*0.08, 0, Math.PI*2);
          ctx.fill();
          ctx.beginPath();
          ctx.arc(r*0.3, -r*0.2, r*0.08, 0, Math.PI*2);
          ctx.fill();

          ctx.restore();
        } else {
          const grad = ctx.createRadialGradient(px, py, 0, cx, cy, r);
          const t = 1 - index / (snake.length + 5);
          grad.addColorStop(0, `rgba(139, 222, 124, ${0.6 + t*0.3})`);
          grad.addColorStop(1, `rgba(60, 139, 61, ${0.8})`);

          ctx.beginPath();
          ctx.ellipse(cx, cy, r*0.95, r*1.05, 0, 0, Math.PI*2);
          ctx.fillStyle = grad;
          ctx.fill();
          ctx.strokeStyle = 'rgba(0,0,0,0.15)';
          ctx.lineWidth = 1;
          ctx.stroke();
        }
      }

      function drawFood() {
        const px = food.x * cellSize + cellSize / 2;
        const py = food.y * cellSize + cellSize / 2;
        const r = cellSize * 0.42;
        const pulse = 1 + Math.sin(animTime * 0.08) * 0.08;

        const gradient = ctx.createRadialGradient(
          px - r*0.3, py - r*0.3, 0,
          px, py, r
        );
        gradient.addColorStop(0, '#ff6b6b');
        gradient.addColorStop(0.4, '#ee5a5a');
        gradient.addColorStop(0.8, '#c0392b');
        gradient.addColorStop(1, '#a93226');

        ctx.save();
        ctx.translate(px, py);
        ctx.scale(pulse, pulse);

        ctx.beginPath();
        ctx.arc(0, 0, r, 0, Math.PI*2);
        ctx.fillStyle = gradient;
        ctx.fill();

        ctx.strokeStyle = 'rgba(0,0,0,0.2)';
        ctx.lineWidth = 2;
        ctx.stroke();

        ctx.fillStyle = 'rgba(255,255,255,0.6)';
        ctx.beginPath();
        ctx.ellipse(-r*0.25, -r*0.3, r*0.15, r*0.2, -0.5, 0, Math.PI*2);
        ctx.fill();

        ctx.restore();
      }

      function drawGrid() {
        ctx.fillStyle = '#1a2332';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        ctx.strokeStyle = 'rgba(255,255,255,0.03)';
        ctx.lineWidth = 1;
        for (let i = 0; i <= COLS; i++) {
          ctx.beginPath();
          ctx.moveTo(i * cellSize, 0);
          ctx.lineTo(i * cellSize, canvas.height);
          ctx.stroke();
        }
        for (let j = 0; j <= ROWS; j++) {
          ctx.beginPath();
          ctx.moveTo(0, j * cellSize);
          ctx.lineTo(canvas.width, j * cellSize);
          ctx.stroke();
        }
      }

      function draw() {
        animTime++;
        drawGrid();
        drawFood();

        snake.forEach((seg, i) => {
          const prev = snake[i - 1] || seg;
          const dx = seg.x - prev.x || dir.x;
          const dy = seg.y - prev.y || dir.y;
          drawSnakeSegment(seg.x, seg.y, i === 0, dx, dy, i);
        });
      }

      function tick() {
        if (gameOver) return;
        dir = { x: nextDir.x, y: nextDir.y };

        const head = snake[0];
        const newHead = { x: head.x + dir.x, y: head.y + dir.y };

        if (newHead.x < 0 || newHead.x >= COLS || newHead.y < 0 || newHead.y >= ROWS) {
          endGame();
          return;
        }
        if (snake.some(s => s.x === newHead.x && s.y === newHead.y)) {
          endGame();
          return;
        }

        snake.unshift(newHead);
        if (newHead.x === food.x && newHead.y === food.y) {
          score += 10;
          document.getElementById('score').textContent = '得分: ' + score;
          document.getElementById('length').textContent = '长度: ' + snake.length;
          randomFood();
        } else {
          snake.pop();
        }

        draw();
      }

      function endGame() {
        gameOver = true;
        if (gameLoopId) clearInterval(gameLoopId);
        document.getElementById('gameOverlay').classList.add('active');
        document.getElementById('finalScore').textContent = '得分: ' + score + '  ·  长度: ' + snake.length;
      }

      function startGame() {
        const startX = Math.floor(COLS / 2) - 1;
        const startY = Math.floor(ROWS / 2);
        snake = [
          { x: startX + 2, y: startY },
          { x: startX + 1, y: startY },
          { x: startX, y: startY }
        ];
        dir = nextDir = { x: 1, y: 0 };
        randomFood();
        score = 0;
        gameOver = false;
        animTime = 0;

        document.getElementById('score').textContent = '得分: 0';
        document.getElementById('length').textContent = '长度: 3';
        document.getElementById('gameOverlay').classList.remove('active');

        draw();
        if (gameLoopId) clearInterval(gameLoopId);
        gameLoopId = setInterval(tick, SPEED);
      }

      function setDir(dx, dy) {
        if (dx === -dir.x && dy === -dir.y) return;
        nextDir = { x: dx, y: dy };
      }

      document.getElementById('btnUp').addEventListener('click', () => setDir(0, -1));
      document.getElementById('btnDown').addEventListener('click', () => setDir(0, 1));
      document.getElementById('btnLeft').addEventListener('click', () => setDir(-1, 0));
      document.getElementById('btnRight').addEventListener('click', () => setDir(1, 0));

      let touchStart = { x: 0, y: 0 };
      canvas.addEventListener('touchstart', e => {
        touchStart = { x: e.touches[0].clientX, y: e.touches[0].clientY };
      }, { passive: true });
      canvas.addEventListener('touchend', e => {
        const dx = e.changedTouches[0].clientX - touchStart.x;
        const dy = e.changedTouches[0].clientY - touchStart.y;
        const minSwipe = 30;
        if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > minSwipe) {
          setDir(dx > 0 ? 1 : -1, 0);
        } else if (Math.abs(dy) > minSwipe) {
          setDir(0, dy > 0 ? 1 : -1);
        }
      }, { passive: true });

      document.addEventListener('keydown', e => {
        if (e.key === 'ArrowUp') { e.preventDefault(); setDir(0, -1); }
        if (e.key === 'ArrowDown') { e.preventDefault(); setDir(0, 1); }
        if (e.key === 'ArrowLeft') { e.preventDefault(); setDir(-1, 0); }
        if (e.key === 'ArrowRight') { e.preventDefault(); setDir(1, 0); }
      });

      document.getElementById('btnRestart').addEventListener('click', startGame);

      startGame();
    })();
  </script>
</body>
</html>
