<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="format-detection" content="telephone=no">
  <title>💕 送给林佳瑶</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { 
      width: 100%; 
      height: 100%; 
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      -webkit-user-select: none;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }
    body {
      background: linear-gradient(135deg, #1a0a2e 0%, #2d1b4e 25%, #1a0a2e 50%, #4a1942 75%, #1a0a2e 100%);
      background-size: 400% 400%;
      animation: bgMove 15s ease infinite;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    @keyframes bgMove {
      0%, 100% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
    }
    .canvas-wrap {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
    }
    .hearts {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      z-index: 1;
    }
    .heart {
      position: absolute;
      font-size: 20px;
      animation: floatUp 8s ease-in infinite;
      opacity: 0.6;
    }
    .heart::before { content: '💗'; }
    .heart:nth-child(2n)::before { content: '💕'; }
    .heart:nth-child(3n)::before { content: '❤️'; }
    .heart:nth-child(5n)::before { content: '💖'; }
    @keyframes floatUp {
      0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
      10% { opacity: 0.6; }
      90% { opacity: 0.3; }
      100% { transform: translateY(-100px) rotate(360deg); opacity: 0; }
    }
    .content {
      position: relative;
      z-index: 10;
      text-align: center;
      padding: 20px;
      max-width: 90vw;
    }
    .title {
      font-size: clamp(14px, 5vw, 18px);
      color: rgba(255, 182, 193, 0.9);
      margin-bottom: 30px;
      letter-spacing: 4px;
      animation: fadeIn 2s ease;
    }
    .main-text {
      font-size: clamp(28px, 10vw, 48px);
      font-weight: 900;
      background: linear-gradient(90deg, #ff6b9d, #c44569, #ff6b9d, #ffb6c1);
      background-size: 300% 100%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: gradientShift 4s ease infinite, pulse 2s ease-in-out infinite;
      line-height: 1.4;
      letter-spacing: 2px;
    }
    .main-text .highlight {
      -webkit-text-fill-color: #ff6b9d;
      text-shadow: 0 0 30px rgba(255, 107, 157, 0.8);
    }
    @keyframes gradientShift {
      0%, 100% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.02); }
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .subtitle {
      margin-top: 40px;
      font-size: clamp(14px, 4vw, 18px);
      color: rgba(255, 255, 255, 0.7);
      animation: fadeIn 2s ease 1s both;
      letter-spacing: 8px;
    }
    .date {
      margin-top: 20px;
      font-size: 12px;
      color: rgba(255, 182, 193, 0.5);
      animation: fadeIn 2s ease 2s both;
    }
    .tap-hint {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 12px;
      color: rgba(255, 255, 255, 0.4);
      animation: blink 2s ease-in-out infinite;
      z-index: 10;
    }
    @keyframes blink {
      0%, 100% { opacity: 0.4; }
      50% { opacity: 1; }
    }
    .sparkle {
      position: absolute;
      width: 4px;
      height: 4px;
      background: #fff;
      border-radius: 50%;
      animation: sparkle 1.5s ease-out forwards;
      pointer-events: none;
    }
    @keyframes sparkle {
      0% { transform: scale(0); opacity: 1; }
      100% { transform: scale(2); opacity: 0; }
    }
  </style>
</head>
<body>
  <canvas class="canvas-wrap" id="canvas"></canvas>
  <div class="hearts" id="hearts"></div>
  <div class="content">
    <div class="title">✦ 来自潘海涛的告白 ✦</div>
    <div class="main-text" id="mainText">潘海涛<span class="highlight">最爱</span>林佳瑶</div>
    <div class="subtitle">Forever & Always</div>
    <div class="date">💕 每一天都比昨天更爱你 💕</div>
  </div>
  <div class="tap-hint">👆 点击屏幕有惊喜</div>

  <script>
    (function() {
      function createHearts() {
        const container = document.getElementById('hearts');
        const hearts = ['💗', '💕', '❤️', '💖', '💝'];
        for (let i = 0; i < 15; i++) {
          const heart = document.createElement('div');
          heart.className = 'heart';
          heart.textContent = hearts[i % hearts.length];
          heart.style.left = Math.random() * 100 + '%';
          heart.style.animationDelay = Math.random() * 8 + 's';
          heart.style.animationDuration = (6 + Math.random() * 4) + 's';
          container.appendChild(heart);
        }
      }
      createHearts();

      const canvas = document.getElementById('canvas');
      const ctx = canvas.getContext('2d');
      let width = canvas.width = window.innerWidth;
      let height = canvas.height = window.innerHeight;

      const stars = [];
      for (let i = 0; i < 80; i++) {
        stars.push({
          x: Math.random() * width,
          y: Math.random() * height,
          r: Math.random() * 2 + 0.5,
          twinkle: Math.random() * Math.PI * 2
        });
      }

      function drawStars() {
        ctx.clearRect(0, 0, width, height);
        const time = Date.now() * 0.002;
        stars.forEach(s => {
          const alpha = 0.3 + Math.sin(time + s.twinkle) * 0.4;
          ctx.beginPath();
          ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
          ctx.fillStyle = 'rgba(255, 182, 193, ' + alpha + ')';
          ctx.fill();
        });
      }

      function animate() {
        drawStars();
        requestAnimationFrame(animate);
      }
      animate();

      window.addEventListener('resize', () => {
        width = canvas.width = window.innerWidth;
        height = canvas.height = window.innerHeight;
      });

      document.body.addEventListener('click', function(e) {
        const sparkle = document.createElement('div');
        sparkle.className = 'sparkle';
        sparkle.style.left = e.clientX - 2 + 'px';
        sparkle.style.top = e.clientY - 2 + 'px';
        document.body.appendChild(sparkle);
        setTimeout(() => sparkle.remove(), 1500);

        const heart = document.createElement('div');
        heart.className = 'heart';
        heart.textContent = ['💗', '💕', '❤️'][Math.floor(Math.random() * 3)];
        heart.style.left = e.clientX + 'px';
        heart.style.top = e.clientY + 'px';
        heart.style.animation = 'none';
        heart.style.fontSize = '30px';
        document.getElementById('hearts').appendChild(heart);
        heart.offsetHeight;
        heart.style.animation = 'floatUp 6s ease-in forwards';
        heart.style.left = (e.clientX - 15) + 'px';
        heart.style.top = (e.clientY - 15) + 'px';
        setTimeout(() => heart.remove(), 6000);
      });
    })();
  </script>
</body>
</html>
